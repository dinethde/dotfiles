customCommands:
  - key: "c"
    context: "files"
    description: "AI commit"
    command: 'git commit -m "{{.Form.Msg}}"'
    prompts:
      - type: "menuFromCommand"
        title: "AI Commit Message"
        key: "Msg"
        command: "/bin/zsh -l -c 'git diff --cached | /Users/dinethdesilva/Library/Python/3.9/bin/sgpt \"Write a concise git commit message, output only the message, no markdown, no quotes\"'"
        filter: '^(?P<msg>.+)$'
        valueFormat: '{{.msg}}'
        labelFormat: '{{.msg | green}}'
